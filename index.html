<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>🏮 元宵快乐 · Happy Lantern Festival</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at 40% 50%, #1b2b4a, #0a1220);
            font-family: 'Segoe UI', 'Arial', 'Microsoft YaHei', sans-serif;
            overflow-x: hidden;
            color: #fdf8e7;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
        }

        .night-sky {
            position: relative;
            width: 100%;
            max-width: 1200px;
            min-height: 600px;
            height: 95vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 2rem 0.8rem 2rem 0.8rem;
            background: transparent;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 2px #f5e6b0 inset;
            backdrop-filter: blur(2px);
            overflow: hidden;
        }

        /* 星星背景 */
        .night-sky::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 8% 15%, #fff9e6, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 20% 40%, #fff4d0, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 30% 75%, #fff9e6, rgba(0,0,0,0)),
                radial-gradient(4px 4px at 42% 12%, #fff2b5, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 55% 30%, #fff9e6, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 63% 80%, #fff4d0, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 70% 48%, #fff9e6, rgba(0,0,0,0)),
                radial-gradient(5px 5px at 78% 22%, #fff2b5, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 85% 64%, #fff9e6, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 92% 35%, #fff4d0, rgba(0,0,0,0)),
                radial-gradient(4px 4px at 10% 88%, #fff2b5, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 15% 68%, #fff9e6, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 35% 52%, #fff4d0, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 48% 90%, #fff9e6, rgba(0,0,0,0));
            background-repeat: no-repeat;
            pointer-events: none;
            z-index: 0;
        }

        .moon {
            position: absolute;
            top: 2%;
            right: 3%;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle at 30% 30%, #fffde7, #ffe68f);
            border-radius: 50%;
            box-shadow: 0 0 60px 15px #ffdf80, 0 0 20px 3px #fff2c0;
            z-index: 1;
            opacity: 0.95;
        }

        /* 灯笼 - 手机优化 */
        .lantern {
            position: absolute;
            font-size: clamp(2.8rem, 9vw, 4.5rem);
            line-height: 1;
            user-select: none;
            filter: drop-shadow(0 0 12px #ff7b2b) drop-shadow(0 0 6px #ffb347);
            animation: float 5s ease-in-out infinite;
            z-index: 5;
            transform-origin: center;
            text-shadow: 0 0 20px #f005;
            pointer-events: none;
        }

        .lantern1 { top: 2%; left: 1%; animation-delay: 0s; font-size: 3.8rem; }
        .lantern2 { top: 8%; right: 2%; animation-delay: 1.2s; font-size: 4.2rem; }
        .lantern3 { bottom: 6%; left: 3%; animation-delay: 0.7s; font-size: 4.5rem; }
        .lantern4 { bottom: 12%; right: 5%; animation-delay: 2s; font-size: 4rem; }
        .lantern5 { top: 20%; left: 8%; animation-delay: 1.5s; font-size: 3.5rem; }
        .lantern6 { bottom: 20%; right: 10%; animation-delay: 0.3s; font-size: 4.8rem; }
        .lantern7 { top: 35%; left: 2%; animation-delay: 2.2s; font-size: 3.8rem; display: block; }
        .lantern8 { bottom: 4%; left: 18%; animation-delay: 1.8s; font-size: 4.2rem; }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1.5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* 中央内容卡片 */
        .content {
            position: relative;
            z-index: 20;
            text-align: center;
            background: rgba(10, 20, 40, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px 15px 40px 15px;
            padding: 1.5rem 1.2rem;
            margin: 1rem 0.8rem;
            border: 2px solid #f5d74288;
            box-shadow: 0 15px 25px -10px black, 0 0 0 2px #f9d56e inset, 0 0 30px #ffb70055;
            max-width: 600px;
            width: 95%;
        }

        /* 语言切换按钮 - 精致小开关 */
        .lang-switch {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 30;
            display: flex;
            gap: 0.5rem;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            padding: 0.4rem 0.6rem;
            border-radius: 40px;
            border: 1px solid #f9d56e;
            box-shadow: 0 0 15px #ffb054;
        }

        .lang-btn {
            background: transparent;
            border: none;
            color: #ffebb5;
            font-size: 1rem;
            font-weight: 600;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            letter-spacing: 0.5px;
            border: 1px solid transparent;
        }

        .lang-btn.active {
            background: #f9d56e;
            color: #1b2b4a;
            border-color: #ffffffb0;
            box-shadow: 0 0 12px #ffd966;
        }

        .lang-btn:first-child.active {
            background: #f9d56e;
        }

        h1 {
            font-size: clamp(2.4rem, 10vw, 4.5rem);
            font-weight: 800;
            letter-spacing: 2px;
            text-shadow: 0 3px 0 #b45f2b, 0 6px 8px #00000080, 0 0 15px #ffc107;
            color: #fff8e0;
            margin-bottom: 0.2rem;
            line-height: 1.2;
        }

        .date {
            font-size: 1rem;
            background: linear-gradient(135deg, #f9d56e, #ffb054);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 1rem;
            text-shadow: 0 2px 5px #00000050;
        }

        .poem {
            font-size: 1.2rem;
            font-style: italic;
            color: #ffebb5;
            margin-bottom: 1.5rem;
            border-top: 1px dashed #f9b83a;
            border-bottom: 1px dashed #f9b83a;
            padding: 0.5rem 0;
            background: #00000020;
            border-radius: 30px;
        }

        .tangyuan-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem 1.8rem;
            margin: 1.5rem 0 1.2rem;
        }

        .ball {
            width: 85px;
            height: 85px;
            background: radial-gradient(circle at 35% 35%, #fffbf0, #fce6c0);
            border-radius: 50%;
            box-shadow: 0 8px 0 #c09a70, 0 12px 20px #00000060, inset -6px -4px 12px #bba88888, inset 4px 4px 15px white;
            position: relative;
            transition: transform 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ball:hover {
            transform: scale(1.05);
        }

        .eye {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #3e2a1f;
            border-radius: 50%;
            top: 35%;
            box-shadow: 0 2px 2px black;
        }

        .left-eye {
            left: 25%;
        }

        .right-eye {
            right: 25%;
        }

        .mouth-smile {
            position: absolute;
            width: 38px;
            height: 20px;
            border-bottom: 4px solid #6b4c3b;
            border-radius: 0 0 30px 30px;
            bottom: 22%;
            left: 50%;
            transform: translateX(-50%);
        }

        .mouth-surprise {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #6b4c3b;
            border-radius: 50%;
            bottom: 25%;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 2px 4px black;
        }

        .ball.wink .right-eye {
            background: transparent;
            width: 14px;
            height: 7px;
            border-bottom: 4px solid #3e2a1f;
            border-radius: 0;
            top: 38%;
            right: 20%;
            box-shadow: none;
        }

        .ball::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 8px;
            background: #ffb6b6a0;
            border-radius: 50%;
            bottom: 40%;
            left: 8%;
            filter: blur(3px);
            opacity: 0.8;
        }

        .ball::before {
            content: '';
            position: absolute;
            width: 18px;
            height: 8px;
            background: #ffb6b6a0;
            border-radius: 50%;
            bottom: 40%;
            right: 8%;
            filter: blur(3px);
            opacity: 0.8;
            z-index: 2;
        }

        .riddle-block {
            margin: 1.5rem auto 0.5rem;
            width: 95%;
            max-width: 360px;
            background: #263b55c0;
            border-radius: 40px 8px 40px 8px;
            border: 2px solid #f1cf7a;
            padding: 0.4rem 0.8rem;
            backdrop-filter: blur(5px);
            color: #ffefc0;
            text-align: left;
        }

        .riddle-summary {
            font-size: 1.2rem;
            font-weight: bold;
            list-style: '🏮 ';
            cursor: pointer;
            padding: 0.3rem 0;
            transition: color 0.2s;
        }

        .riddle-summary:hover {
            color: #ffe88e;
        }

        .riddle-answer {
            margin-top: 0.6rem;
            font-size: 1.4rem;
            color: #ffdb7c;
            text-align: center;
            background: #0e1f2f;
            padding: 0.5rem 0;
            border-radius: 30px;
            border: 1px solid #ffb851;
            box-shadow: 0 0 12px #ffad37;
            letter-spacing: 1px;
            font-weight: bold;
        }

        details[open] .riddle-summary {
            color: #ffd966;
        }

        .footer-note {
            margin-top: 1.5rem;
            font-size: 0.95rem;
            color: #d6c69a;
            text-shadow: 0 0 8px black;
            border-top: 1px solid #fad15e50;
            padding-top: 0.8rem;
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .footer-note span {
            background: #2a3f5a80;
            border-radius: 30px;
            padding: 0.2rem 0.8rem;
            white-space: nowrap;
        }

        /* 响应式微调 */
        @media (max-width: 450px) {
            .content {
                padding: 1.2rem 0.8rem;
            }
            .moon {
                width: 80px;
                height: 80px;
                top: 1%;
                right: 2%;
            }
            .lantern {
                font-size: 3rem;
            }
            .ball {
                width: 75px;
                height: 75px;
            }
            .poem {
                font-size: 1rem;
            }
            .date {
                font-size: 0.9rem;
            }
            .lang-btn {
                font-size: 0.9rem;
                padding: 0.3rem 0.8rem;
            }
        }

        @media (max-width: 380px) {
            .lantern7, .lantern8 {
                display: none;
            }
        }

        .glitter {
            position: absolute;
            color: #ffec9e;
            font-size: 1.8rem;
            opacity: 0.5;
            animation: glitterFloat 8s infinite linear;
            user-select: none;
            pointer-events: none;
            z-index: 2;
        }
        .glitter1 { top: 20%; left: 10%; animation-delay: 0s; }
        .glitter2 { top: 70%; left: 80%; animation-delay: 3s; }
        .glitter3 { top: 45%; left: 70%; animation-delay: 5s; }
        @keyframes glitterFloat {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.2; }
            50% { transform: translateY(-20px) rotate(20deg); opacity: 0.7; }
            100% { transform: translateY(0) rotate(0deg); opacity: 0.2; }
        }
    </style>
</head>
<body>
    <div class="night-sky">
        <div class="moon"></div>

        <!-- 语言切换按钮 -->
        <div class="lang-switch">
            <button class="lang-btn active" id="btn-zh">🏮 中文</button>
            <button class="lang-btn" id="btn-en">🏮 English</button>
        </div>

        <!-- 灯笼装饰 -->
        <div class="lantern lantern1">🏮</div>
        <div class="lantern lantern2">🏮</div>
        <div class="lantern lantern3">🏮</div>
        <div class="lantern lantern4">🏮</div>
        <div class="lantern lantern5">🏮</div>
        <div class="lantern lantern6">🏮</div>
        <div class="lantern lantern7">🏮</div>
        <div class="lantern lantern8">🏮</div>

        <div class="glitter glitter1">✨</div>
        <div class="glitter glitter2">✨</div>
        <div class="glitter glitter3">🎊</div>

        <!-- 内容容器，所有文字部分由JS动态填充 -->
        <div class="content" id="content">
            <!-- 以下内容会通过js替换，但保留初始中文占位 -->
            <h1 id="title">元宵节快乐</h1>
            <div class="date" id="date">🏮 2026年3月2日 · 农历正月十五 🏮</div>
            <div class="poem" id="poem">✨ 火树银花合 · 星桥铁锁开 ✨</div>

            <!-- 汤圆不变，静态 -->
            <div class="tangyuan-row">
                <div class="ball smile">
                    <span class="eye left-eye"></span>
                    <span class="eye right-eye"></span>
                    <span class="mouth-smile"></span>
                </div>
                <div class="ball surprise">
                    <span class="eye left-eye"></span>
                    <span class="eye right-eye"></span>
                    <span class="mouth-surprise"></span>
                </div>
                <div class="ball wink">
                    <span class="eye left-eye"></span>
                    <span class="eye right-eye" style="background: transparent; border-bottom: 4px solid #3e2a1f; width:14px; height:7px; border-radius:0; top:38%; right:20%; box-shadow:none; background:transparent;"></span>
                    <span class="mouth-smile"></span>
                </div>
            </div>

            <!-- 灯谜区域动态 -->
            <div class="riddle-block">
                <details>
                    <summary class="riddle-summary" id="riddleSummary">🏮 猜灯谜：十五的月亮（打一成语）</summary>
                    <div class="riddle-answer" id="riddleAnswer">正大光明</div>
                </details>
            </div>

            <!-- 底部祝福动态 -->
            <div class="footer-note" id="footer">
                <span>🏮 花好月圆</span>
                <span>🍡 事事圆满</span>
                <span>🏮 阖家安康</span>
            </div>
        </div>

        <div style="position: absolute; bottom: 5px; left: 10px; font-size: 0.7rem; color: #ab8e5d; z-index: 30; opacity: 0.5;" id="credit">元宵佳节 · 万事顺遂</div>
    </div>

    <script>
        (function() {
            // 中英文字段映射
            const translations = {
                zh: {
                    title: '元宵节快乐',
                    date: '🏮 2026年3月2日 · 农历正月十五 🏮',
                    poem: '✨ 火树银花合 · 星桥铁锁开 ✨',
                    riddleSummary: '🏮 猜灯谜：十五的月亮（打一成语）',
                    riddleAnswer: '正大光明',
                    footer: ['🏮 花好月圆', '🍡 事事圆满', '🏮 阖家安康'],
                    credit: '元宵佳节 · 万事顺遂'
                },
                en: {
                    title: 'Happy Lantern Festival',
                    date: '🏮 March 2, 2026 · The 15th of First Lunar Month 🏮',
                    poem: '✨ Full moon bright, lanterns aglow · Sweet tangyuan, together we go ✨',
                    riddleSummary: '🏮 Riddle: I’m not the sun, but I shine at night. I change my shape, yet I’m always bright. What am I?',
                    riddleAnswer: 'The Moon',
                    footer: ['🏮 Full Moon, Full Joy', '🍡 Sweet Reunion', '🏮 Peace & Prosperity'],
                    credit: 'Lantern Festival · Wishes come true'
                }
            };

            // 获取DOM元素
            const titleEl = document.getElementById('title');
            const dateEl = document.getElementById('date');
            const poemEl = document.getElementById('poem');
            const riddleSummaryEl = document.getElementById('riddleSummary');
            const riddleAnswerEl = document.getElementById('riddleAnswer');
            const footerEl = document.getElementById('footer');
            const creditEl = document.getElementById('credit');

            // 获取按钮
            const btnZh = document.getElementById('btn-zh');
            const btnEn = document.getElementById('btn-en');

            // 当前语言
            let currentLang = 'zh';  // 默认中文

            // 更新页面文字
            function setLanguage(lang) {
                currentLang = lang;
                const t = translations[lang];

                // 更新标题、日期、诗句
                titleEl.textContent = t.title;
                dateEl.textContent = t.date;
                poemEl.textContent = t.poem;

                // 更新灯谜
                riddleSummaryEl.textContent = t.riddleSummary;
                riddleAnswerEl.textContent = t.riddleAnswer;

                // 更新底部三个祝福语 (footer内部span)
                const footerSpans = footerEl.querySelectorAll('span');
                if (footerSpans.length === 3) {
                    footerSpans[0].textContent = t.footer[0];
                    footerSpans[1].textContent = t.footer[1];
                    footerSpans[2].textContent = t.footer[2];
                }

                // 更新左下角小字
                creditEl.textContent = t.credit;

                // 切换按钮激活样式
                if (lang === 'zh') {
                    btnZh.classList.add('active');
                    btnEn.classList.remove('active');
                } else {
                    btnEn.classList.add('active');
                    btnZh.classList.remove('active');
                }
            }

            // 绑定点击事件
            btnZh.addEventListener('click', () => setLanguage('zh'));
            btnEn.addEventListener('click', () => setLanguage('en'));

            // 初始设置为中文（确保按钮状态和文字一致）
            setLanguage('zh');
        })();
    </script>
</body>
</html>
