<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>🌸 三八妇女节 · 芳华自在 🌸</title>
  <!-- 柔和字体 & 图标库 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      position: relative;
      min-height: 100vh;
      background: linear-gradient(145deg, #ffe9f1 0%, #ffd9e8 100%);
      font-family: 'Quicksand', 'Microsoft YaHei', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      overflow-x: hidden;
    }

    /* 漂浮光斑 */
    .glow-spot {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.35);
      filter: blur(70px);
      z-index: 0;
      animation: float 12s infinite alternate ease-in-out;
    }

    .spot1 {
      width: 350px;
      height: 350px;
      top: -100px;
      left: -120px;
      background: #fcc9d4;
      opacity: 0.7;
      animation-duration: 18s;
    }

    .spot2 {
      width: 400px;
      height: 400px;
      bottom: -150px;
      right: -150px;
      background: #dcccff;
      opacity: 0.6;
      filter: blur(90px);
      animation-duration: 22s;
      animation-delay: -5s;
    }

    .spot3 {
      width: 250px;
      height: 250px;
      top: 40%;
      left: 70%;
      background: #ffe0b5;
      opacity: 0.6;
      filter: blur(60px);
      animation-duration: 16s;
      animation-delay: -2s;
    }

    .spot4 {
      width: 300px;
      height: 300px;
      top: 60%;
      left: 10%;
      background: #ffb6d1;
      opacity: 0.4;
      filter: blur(80px);
      animation-duration: 20s;
      animation-delay: -8s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, -30px) scale(1.1); }
    }

    /* 飘落花瓣 (背景氛围) */
    .petal {
      position: absolute;
      font-size: 1.2rem;
      opacity: 0.6;
      user-select: none;
      pointer-events: none;
      z-index: 5;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% {
        transform: translateY(-10vh) rotate(0deg);
        opacity: 0.8;
      }
      100% {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0.2;
      }
    }

    /* 新增漂浮爱心（背景更丰富） */
    .floating-heart {
      position: absolute;
      font-size: 1.4rem;
      opacity: 0.4;
      user-select: none;
      pointer-events: none;
      z-index: 4;
      animation: floatHeart 14s infinite alternate ease-in-out;
    }

    @keyframes floatHeart {
      0% { transform: translate(0, 0) rotate(0deg) scale(1); }
      100% { transform: translate(40px, -40px) rotate(20deg) scale(1.2); }
    }

    /* 主卡片入场动画 */
    .greeting-card {
      position: relative;
      z-index: 10;
      max-width: 650px;
      width: 100%;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 48px;
      box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.15),
                  0 0 0 1px rgba(255, 255, 255, 0.6) inset;
      padding: 2.8rem 2.2rem;
      border: 1px solid rgba(255,255,255,0.7);
      animation: cardAppear 0.9s cubic-bezier(0.12, 0.71, 0.33, 1) forwards,
                 cardBreath 6s infinite ease-in-out 1s; /* 新增卡片轻微呼吸 */
      opacity: 0;
      transform: translateY(20px);
    }

    @keyframes cardAppear {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* 新增卡片呼吸效果 */
    @keyframes cardBreath {
      0% { box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(255, 255, 255, 0.6) inset; }
      50% { box-shadow: 0 30px 60px -6px rgba(220, 120, 140, 0.3), 0 0 0 3px rgba(255, 255, 255, 0.8) inset; }
      100% { box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(255, 255, 255, 0.6) inset; }
    }

    .card-decor {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 2.2rem;
      opacity: 0.3;
      rotate: 10deg;
      pointer-events: none;
      animation: decorRotate 10s infinite linear; /* 新增旋转 */
    }

    @keyframes decorRotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .icon-row {
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      margin-bottom: 1rem;
      color: #c45d7a;
      font-size: 2rem;
    }

    .icon-row i {
      filter: drop-shadow(0 4px 6px rgba(220, 120, 140, 0.3));
      transition: transform 0.3s ease;
      animation: iconFloat 3s infinite alternate ease-in-out; /* 新增浮动 */
    }

    .icon-row i:nth-child(1) { animation-delay: 0s; }
    .icon-row i:nth-child(2) { animation-delay: 0.4s; }
    .icon-row i:nth-child(3) { animation-delay: 0.8s; }

    @keyframes iconFloat {
      0% { transform: translateY(0); }
      100% { transform: translateY(-6px); }
    }

    .icon-row i:hover {
      transform: scale(1.1) rotate(5deg);
    }

    h1 {
      font-size: 2.6rem;
      font-weight: 700;
      color: #442b36;
      text-align: center;
      letter-spacing: 1px;
      margin-bottom: 0.3rem;
      text-shadow: 2px 2px 10px rgba(255, 200, 220, 0.6);
      animation: titleGlow 3s infinite alternate; /* 新增标题光晕 */
    }

    @keyframes titleGlow {
      0% { text-shadow: 2px 2px 10px #ffc8dc; }
      100% { text-shadow: 4px 4px 20px #ffb0c8, 0 0 10px #ffe2f0; }
    }

    .sub-date {
      text-align: center;
      font-weight: 300;
      font-size: 1.3rem;
      color: #7f5a68;
      margin-bottom: 2.3rem;
      border-bottom: 1px dashed #f9bacb;
      padding-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      position: relative;
      overflow: hidden; /* 为流光做准备 */
    }

    /* 新增底部流光 */
    .sub-date::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: -100%;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #f9a8b8, transparent);
      animation: flowLight 3s infinite;
    }

    @keyframes flowLight {
      0% { left: -100%; }
      50% { left: 100%; }
      100% { left: 100%; }
    }

    .sub-date i {
      color: #d66b8a;
      font-size: 1.2rem;
      animation: iconPulse 2s infinite alternate; /* 图标脉冲 */
    }

    @keyframes iconPulse {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(1.2); opacity: 1; }
    }

    /* 祝福语区域 */
    .blessing {
      background: rgba(255, 245, 248, 0.6);
      border-radius: 40px;
      padding: 2rem 1.8rem;
      margin: 1.8rem 0 2rem 0;
      box-shadow: 0 8px 18px -6px rgba(180, 120, 140, 0.2);
      border: 1px solid #ffffffbe;
    }

    .blessing p {
      font-size: 1.4rem;
      line-height: 2.2rem;
      color: #38242c;
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 0.8rem;
      opacity: 0;
      animation: slideInWord 0.6s ease forwards;
    }

    .blessing p:nth-child(1) { animation-delay: 0.2s; }
    .blessing p:nth-child(2) { animation-delay: 0.4s; }
    .blessing p:nth-child(3) { animation-delay: 0.6s; }
    .blessing p:nth-child(4) { animation-delay: 0.8s; }

    @keyframes slideInWord {
      0% { opacity: 0; transform: translateX(-15px); }
      100% { opacity: 1; transform: translateX(0); }
    }

    .blessing i {
      color: #c45d7a;
      width: 1.8rem;
      font-size: 1.5rem;
      text-align: center;
      animation: iconRotate 5s infinite ease-in-out; /* 新增图标微旋转 */
    }

    @keyframes iconRotate {
      0% { transform: rotate(0deg); }
      25% { transform: rotate(5deg); }
      75% { transform: rotate(-5deg); }
      100% { transform: rotate(0deg); }
    }

    .flower-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      margin: 2rem 0 1.5rem;
      color: #b25673;
      font-size: 2rem;
    }

    .flower-divider span {
      font-size: 2.2rem;
      line-height: 1;
      filter: drop-shadow(0 2px 5px #fbaac3);
      animation: pulseFlower 3s infinite ease-in-out;
    }

    @keyframes pulseFlower {
      0% { transform: scale(1); filter: drop-shadow(0 2px 5px #fbaac3); }
      50% { transform: scale(1.1); filter: drop-shadow(0 5px 12px #ff9eb5); }
      100% { transform: scale(1); filter: drop-shadow(0 2px 5px #fbaac3); }
    }

    .flower-divider i {
      font-size: 1.8rem;
      opacity: 0.9;
      animation: rotateStar 4s linear infinite, starGlow 2s alternate infinite; /* 新增闪烁 */
    }

    @keyframes rotateStar {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes starGlow {
      0% { color: #b25673; opacity: 0.7; }
      100% { color: #e38aa5; opacity: 1; text-shadow: 0 0 8px #ffc0cb; }
    }

    .tribute {
      text-align: center;
      font-size: 1.2rem;
      font-weight: 300;
      color: #6f4b58;
      letter-spacing: 2px;
      margin-bottom: 2rem;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeInTribute 0.8s ease forwards 1s,
                 tributeBreath 3s infinite alternate 2s; /* 新增呼吸 */
    }

    @keyframes fadeInTribute {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    @keyframes tributeBreath {
      0% { text-shadow: 0 0 2px #ffd1dc; }
      100% { text-shadow: 0 0 15px #feb6c5; }
    }

    .festive-btn {
      display: flex;
      justify-content: center;
    }

    .btn-glow {
      background: linear-gradient(135deg, #ffb6c1, #f8a5b9);
      border: none;
      padding: 1rem 2.8rem;
      border-radius: 60px;
      font-size: 1.6rem;
      font-weight: 600;
      color: #4f2d3a;
      box-shadow: 0 10px 20px -5px #f7a0b6, 0 0 0 2px #fff9f9 inset;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      border: 1px solid #ffeef2;
      animation: softPulse 2.2s infinite alternate,
                 btnWobble 5s infinite; /* 新增轻微摆动 */
    }

    @keyframes softPulse {
      0% { box-shadow: 0 10px 20px -5px #f7a0b6, 0 0 0 2px #fff9f9 inset; }
      100% { box-shadow: 0 15px 30px -3px #f28b9f, 0 0 0 4px #ffffff inset; }
    }

    @keyframes btnWobble {
      0%,100% { transform: rotate(0deg); }
      5% { transform: rotate(1deg); }
      10% { transform: rotate(-1deg); }
      15% { transform: rotate(0.5deg); }
      20% { transform: rotate(0deg); }
    }

    .btn-glow:hover {
      transform: scale(1.02);
      box-shadow: 0 15px 25px -5px #f38b9f, 0 0 0 3px #ffffff inset;
    }

    .btn-glow span {
      font-size: 2rem;
      line-height: 1;
      display: inline-block;
      animation: gentleWobble 3s infinite;
    }

    @keyframes gentleWobble {
      0%,100% { transform: rotate(0deg); }
      25% { transform: rotate(5deg); }
      75% { transform: rotate(-5deg); }
    }

    .footer-note {
      text-align: center;
      margin-top: 2.5rem;
      font-size: 1rem;
      color: #a47b88;
      font-weight: 300;
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      align-items: center;
      opacity: 0;
      animation: fadeInFooter 1s ease forwards 1.3s,
                 footerSlide 4s infinite alternate; /* 新增水平滑动 */
    }

    @keyframes fadeInFooter {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    @keyframes footerSlide {
      0% { transform: translateX(0); }
      100% { transform: translateX(8px); }
    }

    .footer-note i {
      color: #c88098;
      font-size: 1rem;
      animation: footerIconPulse 2s infinite alternate;
    }

    @keyframes footerIconPulse {
      0% { transform: scale(1); }
      100% { transform: scale(1.2); color: #e691af; }
    }

    /* 临时花瓣展开动画 */
    .burst-petal {
      position: fixed;
      font-size: 1.5rem;
      user-select: none;
      pointer-events: none;
      z-index: 9999;
      animation: burst 1.2s ease-out forwards;
    }

    @keyframes burst {
      0% {
        opacity: 1;
        transform: translate(0, 0) rotate(0deg) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(var(--tx), var(--ty)) rotate(var(--tr)) scale(0.2);
      }
    }

    /* 手机端优化 */
    @media (max-width: 600px) {
      body {
        padding: 0.8rem;
        padding-top: 2rem;
        padding-bottom: 2rem;
      }
      .greeting-card {
        padding: 2rem 1.5rem;
        border-radius: 36px;
      }
      h1 {
        font-size: 2.2rem;
      }
      .sub-date {
        font-size: 1.1rem;
        margin-bottom: 1.8rem;
      }
      .blessing {
        padding: 1.5rem 1.2rem;
      }
      .blessing p {
        font-size: 1.2rem;
        line-height: 1.9rem;
        gap: 0.6rem;
      }
      .blessing i {
        width: 1.5rem;
        font-size: 1.2rem;
      }
      .btn-glow {
        font-size: 1.4rem;
        padding: 0.8rem 2rem;
        min-width: 240px;
        justify-content: center;
      }
      .btn-glow span {
        font-size: 1.8rem;
      }
      .flower-divider span {
        font-size: 1.8rem;
      }
      .icon-row {
        font-size: 1.8rem;
      }
      .icon-row i {
        padding: 8px;
      }
    }

    @media (max-width: 380px) {
      h1 {
        font-size: 1.9rem;
      }
      .blessing p {
        font-size: 1.1rem;
      }
      .greeting-card {
        padding: 1.5rem 1.2rem;
      }
      .btn-glow {
        font-size: 1.2rem;
        padding: 0.7rem 1.2rem;
      }
    }

    .tiny-star {
      position: absolute;
      font-size: 1rem;
      color: rgba(255,255,200,0.8);
      z-index: 5;
      pointer-events: none;
      animation: twinkle 3s infinite alternate;
    }

    @keyframes twinkle {
      0% { opacity: 0.3; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1.2); }
    }

    @media (max-width: 480px) {
      .card-decor {
        font-size: 1.8rem;
        top: 10px;
        right: 15px;
      }
    }
  </style>
</head>
<body>

  <!-- 漂浮光斑 -->
  <div class="glow-spot spot1"></div>
  <div class="glow-spot spot2"></div>
  <div class="glow-spot spot3"></div>
  <div class="glow-spot spot4"></div>

  <!-- 飘落花瓣 (背景) -->
  <div class="petal" style="left: 5%; animation-duration: 10s; animation-delay: -1s;">🌸</div>
  <div class="petal" style="left: 15%; animation-duration: 12s; animation-delay: -4s;">🌼</div>
  <div class="petal" style="left: 30%; animation-duration: 9s; animation-delay: -2s;">🌺</div>
  <div class="petal" style="left: 50%; animation-duration: 14s; animation-delay: -7s;">🌸</div>
  <div class="petal" style="left: 70%; animation-duration: 11s; animation-delay: -3s;">🌷</div>
  <div class="petal" style="left: 85%; animation-duration: 13s; animation-delay: -5s;">🌼</div>
  <div class="petal" style="left: 92%; animation-duration: 8s; animation-delay: -2s;">🌸</div>
  <div class="petal" style="left: 40%; animation-duration: 15s; animation-delay: -9s;">🌺</div>
  <div class="petal" style="left: 18%; animation-duration: 11s; animation-delay: -1s;">🌸</div>
  <div class="petal" style="left: 75%; animation-duration: 10s; animation-delay: -6s;">🌼</div>

  <!-- 新增漂浮爱心 -->
  <div class="floating-heart" style="left: 10%; top: 20%; animation-duration: 16s;">❤️</div>
  <div class="floating-heart" style="left: 80%; top: 70%; animation-duration: 19s;">🧡</div>
  <div class="floating-heart" style="left: 45%; top: 85%; animation-duration: 14s;">💛</div>
  <div class="floating-heart" style="left: 90%; top: 30%; animation-duration: 21s;">💚</div>
  <div class="floating-heart" style="left: 20%; top: 60%; animation-duration: 18s;">💙</div>

  <!-- 主卡片 -->
  <div class="greeting-card">

    <div class="card-decor">🌸🌼🌺</div>

    <div class="icon-row">
      <i class="fas fa-venus"></i>
      <i class="fas fa-heart" style="color: #e07d96;"></i>
      <i class="fas fa-venus"></i>
    </div>

    <h1>三八妇女节快乐</h1>

    <!-- 年份已修改为 2026 -->
    <div class="sub-date">
      <i class="far fa-calendar-alt"></i> 2026 · 03 · 08 <i class="fas fa-feather" style="margin-left: 5px;"></i>
    </div>

    <div class="blessing">
      <p><i class="fas fa-sparkles"></i> 愿你眼里有光，心中有梦</p>
      <p><i class="fas fa-feather"></i> 独立如风，自由且从容</p>
      <p><i class="fas fa-sun"></i> 愿你自带光芒，温暖有力量</p>
      <p><i class="fas fa-hand-sparkles"></i> 被岁月温柔以待，一生芳华</p>
    </div>

    <div class="flower-divider">
      <i class="fas fa-star"></i>
      <span>🌷 🌸 🌺</span>
      <i class="fas fa-star"></i>
    </div>

    <div class="tribute">
      ✦ 致敬每一位闪光的你 ✦
    </div>

    <!-- 为按钮添加ID，以便点击触发花瓣展开 -->
    <div class="festive-btn">
      <div class="btn-glow" id="celebrateBtn">
        <span>💐</span> 节日快乐 <span>🌹</span>
      </div>
    </div>

    <div class="footer-note">
      <i class="fas fa-chevron-left" style="opacity: 0.5;"></i>
      <span>愿你笑靥如花 · 不减芳华</span>
      <i class="fas fa-chevron-right" style="opacity: 0.5;"></i>
    </div>
  </div>

  <!-- 飘浮小星星 -->
  <div class="tiny-star" style="top: 15%; left: 8%;">✨</div>
  <div class="tiny-star" style="bottom: 12%; right: 5%;">✨</div>
  <div class="tiny-star" style="top: 25%; right: 12%;">🌟</div>
  <div class="tiny-star" style="bottom: 30%; left: 6%;">💫</div>

  <!-- 底部装饰 -->
  <div style="position: absolute; bottom: 3%; left: 3%; font-size: 2rem; opacity: 0.2; rotate: -10deg; z-index: 1; pointer-events: none;">🌼🌼</div>
  <div style="position: absolute; top: 5%; right: 3%; font-size: 2.2rem; opacity: 0.2; rotate: 15deg; z-index: 1; pointer-events: none;">🌸🌸</div>

  <script>
    (function() {
      const btn = document.getElementById('celebrateBtn');
      if (!btn) return;

      // 可选的花瓣emoji数组
      const petals = ['🌸', '🌼', '🌺', '🌷', '🌻', '💐', '🌸', '🌼', '🌺'];

      btn.addEventListener('click', function(e) {
        // 获取按钮中心位置（相对于视口）
        const rect = btn.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;

        // 生成20个展开花瓣
        const count = 20;
        for (let i = 0; i < count; i++) {
          // 随机选择一个花瓣emoji
          const petalEmoji = petals[Math.floor(Math.random() * petals.length)];
          
          // 创建div
          const div = document.createElement('div');
          div.className = 'burst-petal';
          div.textContent = petalEmoji;
          
          // 随机方向与距离
          const angle = Math.random() * 2 * Math.PI; // 0~2PI
          const distance = 80 + Math.random() * 150; // 80~230px
          const tx = Math.cos(angle) * distance;
          const ty = Math.sin(angle) * distance;
          const tr = (Math.random() * 720 - 360) + 'deg'; // 随机旋转角度
          
          // 设置自定义属性，供动画使用
          div.style.setProperty('--tx', tx + 'px');
          div.style.setProperty('--ty', ty + 'px');
          div.style.setProperty('--tr', tr);
          
          // 设置起始位置为中心点
          div.style.left = centerX + 'px';
          div.style.top = centerY + 'px';
          div.style.transform = 'translate(-50%, -50%)'; // 使中心对准坐标
          
          // 随机大小
          const scale = 0.8 + Math.random() * 0.7;
          div.style.fontSize = (1.2 * scale) + 'rem';
          
          // 添加到body
          document.body.appendChild(div);
          
          // 动画结束后移除元素
          div.addEventListener('animationend', function() {
            if (div.parentNode) {
              div.parentNode.removeChild(div);
            }
          });
        }
      });
    })();
  </script>
</body>
</html>
